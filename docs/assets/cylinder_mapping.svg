<rect x="120" y="730" width="1160" height="90" rx="12" fill="#fff" stroke="#ccc"/>
<text x="140" y="762" class="small">Mapping formula: channel = x // 2; if x is even → index = y; if x is odd → index = 343 - y</text>
<text x="140" y="790" class="small">Physical signal path: S0 up → S1 down, S2 up → S3 down, S4 up → S5 down, S6 up → S7 down, S8 up → S9 down</text>
